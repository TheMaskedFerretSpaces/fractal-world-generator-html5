<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WORLD_GEN // TMF.SPACE_CORE</title>
    <style>
        /* TMF.SPACE GLOBAL STYLES */
        body { 
            background-color: #000; 
            color: #00f0ff; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow-x: hidden;
        }

        /* NEON HEADER */
        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 20px 0;
            text-shadow: 0 0 10px #00f0ff;
        }

        /* TERMINAL TOOLBAR */
        .toolbar { 
            background: rgba(0, 20, 30, 0.8);
            width: 90%; 
            max-width: 1000px;
            padding: 20px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: space-between; 
            gap: 20px; 
            border: 1px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            margin-bottom: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }

        label { 
            font-size: 10px; 
            color: #00f0ff; 
            opacity: 0.7;
            text-transform: uppercase; 
        }

        select, input { 
            background: #000; 
            color: #00f0ff; 
            border: 1px solid #00f0ff; 
            padding: 8px; 
            font-family: monospace;
            outline: none;
        }

        select:focus, input:focus {
            box-shadow: 0 0 8px #00f0ff;
        }

        /* GLOW BUTTON */
        button { 
            padding: 12px 24px; 
            background: #00f0ff; 
            color: #000; 
            border: none; 
            font-family: monospace;
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover { 
            background: #fff; 
            box-shadow: 0 0 20px #00f0ff;
            transform: scale(1.05);
        }

        /* SCANLINE EFFECT OVER CANVAS */
        .canvas-container {
            position: relative;
            border: 1px solid #00f0ff;
            line-height: 0;
        }

        .canvas-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        canvas { 
            background: #000; 
            display: block;
        }

        .status {
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <h1>> WORLD_GENERATOR_V2.2a</h1>

    <div class="toolbar">
        <div class="control-group">
            <label>Map_Projection</label>
            <select id="projection">
                <option value="mercator">RECTILINEAR</option>
                <option value="mollweide">MOLLWEIDE</option>
                <option value="sinusoidal">SINUSOIDAL</option>
            </select>
        </div>
        <div class="control-group">
            <label>Color_Profile</label>
            <select id="palette">
                <option value="atlas">NEO_ATLAS</option>
                <option value="antique">ARCHIVE</option>
                <option value="martian">OUTPOST_01</option>
                <option value="barren">VOID_MAP</option>
            </select>
        </div>
        <div class="control-group">
            <label>H2O_Saturation %</label>
            <input type="number" id="water" value="70" min="0" max="100">
        </div>
        <div class="control-group">
            <label>Compute_Cycles</label>
            <input type="number" id="iterations" value="1200" min="100" max="5000">
        </div>
        <button onclick="generate()">[ EXECUTE ]</button>
    </div>

    <div class="canvas-container">
        <canvas id="worldCanvas"></canvas>
    </div>

    <div class="status" id="statusMsg">SYSTEM READY... awaiting input</div>

<script>
    const canvas = document.getElementById('worldCanvas');
    const ctx = canvas.getContext('2d');
    const W = 1000;
    const H = 500;
    canvas.width = W;
    canvas.height = H;

    const Palettes = {
        atlas: { sea: [0, 40, 80], land: [0, 150, 100], mt: [200, 255, 255] },
        antique: { sea: [60, 50, 30], land: [150, 130, 90], mt: [255, 240, 200] },
        martian: { sea: [50, 0, 0], land: [180, 40, 0], mt: [255, 180, 100] },
        barren: { sea: [10, 10, 10], land: [80, 80, 80], mt: [200, 200, 200] }
    };

    async function generate() {
        const status = document.getElementById('statusMsg');
        status.innerText = "INITIALIZING SEED... COMPUTING VECTORS...";
        
        // Brief timeout to allow UI to update status
        await new Promise(r => setTimeout(r, 50));

        const iter = parseInt(document.getElementById('iterations').value);
        const waterPct = parseInt(document.getElementById('water').value);
        const palette = Palettes[document.getElementById('palette').value];
        const proj = document.getElementById('projection').value;

        let map = new Float32Array(W * H).fill(0);
        for(let i=0; i<iter; i++) {
            let phi = Math.random() * Math.PI * 2;
            let theta = Math.random() * Math.PI;
            let nx = Math.cos(phi) * Math.sin(theta);
            let ny = Math.sin(phi) * Math.sin(theta);
            let nz = Math.cos(theta);

            for(let y=0; y<H; y++) {
                let lat = (Math.PI * y) / H - Math.PI/2;
                let cosLat = Math.cos(lat);
                let sinLat = Math.sin(lat);
                for(let x=0; x<W; x++) {
                    let lon = (Math.PI * 2 * x) / W - Math.PI;
                    let px = Math.cos(lon) * cosLat;
                    let py = Math.sin(lon) * cosLat;
                    let pz = sinLat;
                    map[y*W + x] += (px*nx + py*ny + pz*nz > 0) ? 1 : -1;
                }
            }
        }

        let sorted = [...map].sort((a,b) => a-b);
        let seaLevel = sorted[Math.floor((waterPct/100) * (sorted.length-1))];
        let min = sorted[0], max = sorted[sorted.length-1];

        const img = ctx.createImageData(W, H);
        for(let y=0; y<H; y++) {
            let lat = (y / H) * Math.PI - Math.PI/2;
            for(let x=0; x<W; x++) {
                let lon = (x / W) * 2 * Math.PI - Math.PI;
                let tx = x, skip = false;

                if(proj === 'mollweide') {
                    tx = W/2 + (W/2) * (lon/Math.PI) * Math.cos(lat);
                    if(Math.abs(x - W/2) > (W/2) * Math.cos(lat)) skip = true;
                } else if(proj === 'sinusoidal') {
                    tx = W/2 + (x - W/2) * Math.cos(lat);
                    if(Math.abs(x - W/2) > (W/2) * Math.cos(lat)) skip = true;
                }

                if(skip) continue;

                let h = map[y*W + x];
                let outIdx = (y*W + Math.floor(tx)) * 4;
                let color = [0,0,0];

                if(h <= seaLevel) {
                    let d = (h - min) / (seaLevel - min);
                    color = palette.sea.map(c => c * (0.4 + d*0.6));
                } else {
                    let d = (h - seaLevel) / (max - seaLevel);
                    color = palette.land.map((c, i) => c + (palette.mt[i] - c) * d);
                }

                img.data[outIdx] = color[0];
                img.data[outIdx+1] = color[1];
                img.data[outIdx+2] = color[2];
                img.data[outIdx+3] = 255;
            }
        }
        ctx.clearRect(0,0,W,H);
        ctx.putImageData(img, 0, 0);
        status.innerText = "RENDER COMPLETE. STANDBY.";
    }

    generate();
</script>
</body>
</html>
