<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donjon World Generator Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #ddd; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .toolbar { background: #2d2d2d; width: 100%; padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; border-bottom: 2px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .control-group { display: flex; flex-direction: column; align-items: flex-start; }
        label { font-size: 12px; text-transform: uppercase; margin-bottom: 4px; color: #888; }
        select, input { background: #3d3d3d; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        button { padding: 10px 20px; background: #d4a017; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; align-self: flex-end; }
        button:hover { background: #ffcc33; }
        canvas { margin-top: 30px; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: #000; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="control-group">
            <label>Projection</label>
            <select id="projection">
                <option value="mercator">Square Mercator</option>
                <option value="mollweide">Mollweide</option>
                <option value="sinusoidal">Sinusoidal</option>
            </select>
        </div>
        <div class="control-group">
            <label>Palette</label>
            <select id="palette">
                <option value="atlas">Atlas</option>
                <option value="antique">Antique</option>
                <option value="martian">Martian</option>
                <option value="barren">Barren</option>
            </select>
        </div>
        <div class="control-group">
            <label>% Water</label>
            <input type="number" id="water" value="70" min="0" max="100">
        </div>
        <div class="control-group">
            <label>Iterations</label>
            <input type="number" id="iterations" value="1500" min="100" max="5000">
        </div>
        <button onclick="generate()">Generate World</button>
    </div>

    <canvas id="worldCanvas"></canvas>

<script>
    const canvas = document.getElementById('worldCanvas');
    const ctx = canvas.getContext('2d');
    const W = 1000;
    const H = 500;
    canvas.width = W;
    canvas.height = H;

    const Palettes = {
        atlas: { sea: [0, 50, 120], land: [34, 139, 34], mt: [255, 255, 255] },
        antique: { sea: [170, 160, 130], land: [210, 190, 150], mt: [120, 100, 80] },
        martian: { sea: [80, 20, 20], land: [180, 60, 40], mt: [255, 200, 150] },
        barren: { sea: [50, 50, 50], land: [120, 120, 120], mt: [220, 220, 220] }
    };

    function generate() {
        const iter = parseInt(document.getElementById('iterations').value);
        const waterPct = parseInt(document.getElementById('water').value);
        const palette = Palettes[document.getElementById('palette').value];
        const proj = document.getElementById('projection').value;

        // Generate heightmap (same logic as C code)
        let map = new Float32Array(W * H).fill(0);
        for(let i=0; i<iter; i++) {
            let phi = Math.random() * Math.PI * 2;
            let theta = Math.random() * Math.PI;
            let nx = Math.cos(phi) * Math.sin(theta);
            let ny = Math.sin(phi) * Math.sin(theta);
            let nz = Math.cos(theta);

            for(let y=0; y<H; y++) {
                let lat = (Math.PI * y) / H - Math.PI/2;
                for(let x=0; x<W; x++) {
                    let lon = (Math.PI * 2 * x) / W - Math.PI;
                    let px = Math.cos(lon) * Math.cos(lat);
                    let py = Math.sin(lon) * Math.cos(lat);
                    let pz = Math.sin(lat);
                    map[y*W + x] += (px*nx + py*ny + pz*nz > 0) ? 1 : -1;
                }
            }
        }

        // Determine Sea Level
        let sorted = [...map].sort((a,b) => a-b);
        let seaLevel = sorted[Math.floor((waterPct/100) * (sorted.length-1))];
        let min = sorted[0], max = sorted[sorted.length-1];

        // Render with Projection
        const img = ctx.createImageData(W, H);
        for(let y=0; y<H; y++) {
            for(let x=0; x<W; x++) {
                let targetX = x, targetY = y;
                
                // Projection Logic
                let lat = (y / H) * Math.PI - Math.PI/2;
                let lon = (x / W) * 2 * Math.PI - Math.PI;
                let skip = false;

                if(proj === 'mollweide') {
                    // Approximate Mollweide
                    targetX = W/2 + (W/2) * (lon/Math.PI) * Math.cos(lat);
                    if(Math.abs(x - W/2) > (W/2) * Math.cos(lat)) skip = true;
                } else if(proj === 'sinusoidal') {
                    targetX = W/2 + (x - W/2) * Math.cos(lat);
                    if(Math.abs(x - W/2) > (W/2) * Math.cos(lat)) skip = true;
                }

                if(skip) continue;

                let h = map[y*W + x];
                let idx = (Math.floor(y)*W + Math.floor(x)) * 4;
                let outIdx = (y*W + Math.floor(targetX)) * 4;
                
                let color = [0,0,0];
                if(h <= seaLevel) {
                    let d = (h - min) / (seaLevel - min);
                    color = palette.sea.map(c => c * (0.5 + d*0.5));
                } else {
                    let d = (h - seaLevel) / (max - seaLevel);
                    color = palette.land.map((c, i) => c + (palette.mt[i] - c) * d);
                }

                img.data[outIdx] = color[0];
                img.data[outIdx+1] = color[1];
                img.data[outIdx+2] = color[2];
                img.data[outIdx+3] = 255;
            }
        }
        ctx.clearRect(0,0,W,H);
        ctx.putImageData(img, 0, 0);
    }

    generate();
</script>
</body>
</html>
