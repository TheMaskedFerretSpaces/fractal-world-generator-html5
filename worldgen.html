<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WORLD_GEN // TMF.SPACE_CORE</title>
    <style>
        body { 
            background-color: #000; 
            color: #00f0ff; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 20px 0;
            text-shadow: 0 0 10px #00f0ff;
        }

        .toolbar { 
            background: rgba(0, 20, 30, 0.8);
            width: 90%; 
            max-width: 1100px;
            padding: 20px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: space-between; 
            gap: 15px; 
            border: 1px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            margin-bottom: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }

        label { 
            font-size: 10px; 
            color: #00f0ff; 
            opacity: 0.7;
            text-transform: uppercase; 
        }

        select, input { 
            background: #000; 
            color: #00f0ff; 
            border: 1px solid #00f0ff; 
            padding: 8px; 
            font-family: monospace;
            outline: none;
        }

        button { 
            padding: 12px 24px; 
            background: #00f0ff; 
            color: #000; 
            border: none; 
            font-family: monospace;
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover { 
            background: #fff; 
            box-shadow: 0 0 20px #00f0ff;
            transform: scale(1.02);
        }

        .canvas-container {
            position: relative;
            border: 1px solid #00f0ff;
            line-height: 0;
            margin-bottom: 10px;
        }

        /* Scanline Overlay */
        .canvas-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        canvas { background: #000; display: block; }

        .status { font-size: 11px; opacity: 0.6; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1>> WORLD_GENERATOR_V2.2a</h1>

    <div class="toolbar">
        <div class="control-group">
            <label>Projection</label>
            <select id="projection">
                <option value="mercator">RECTILINEAR</option>
                <option value="mollweide">MOLLWEIDE</option>
                <option value="sinusoidal">SINUSOIDAL</option>
            </select>
        </div>
        <div class="control-group">
            <label>Profile</label>
            <select id="palette">
                <option value="atlas">NEO_ATLAS</option>
                <option value="antique">ARCHIVE</option>
                <option value="martian">OUTPOST_01</option>
                <option value="barren">VOID_MAP</option>
            </select>
        </div>
        <div class="control-group">
            <label>H2O_Sat %</label>
            <input type="number" id="water" value="70" min="0" max="100">
        </div>
        <div class="control-group">
            <label>Ice_Cap %</label>
            <input type="number" id="ice" value="10" min="0" max="50">
        </div>
        <div class="control-group">
            <label>Compute_Cycles</label>
            <input type="number" id="iterations" value="1200" min="100" max="5000">
        </div>
        <button onclick="generate()">[ EXECUTE ]</button>
    </div>

    <div class="canvas-container">
        <canvas id="worldCanvas"></canvas>
    </div>

    <div class="status" id="statusMsg">READY_FOR_SEQUENCING...</div>

<script>
    const canvas = document.getElementById('worldCanvas');
    const ctx = canvas.getContext('2d');
    const W = 1000;
    const H = 500;
    canvas.width = W;
    canvas.height = H;

    const Palettes = {
        atlas:   { sea: [0, 40, 80],   land: [0, 150, 100],  mt: [150, 150, 150], ice: [220, 240, 255] },
        antique: { sea: [60, 50, 30],  land: [150, 130, 90],  mt: [100, 80, 60],   ice: [240, 235, 220] },
        martian: { sea: [50, 0, 0],    land: [180, 40, 0],   mt: [100, 60, 40],   ice: [255, 200, 200] },
        barren:  { sea: [10, 10, 10],  land: [80, 80, 80],   mt: [40, 40, 40],    ice: [255, 255, 255] }
    };

    async function generate() {
        const status = document.getElementById('statusMsg');
        status.innerText = "ALLOCATING VECTORS... CALCULATING CRUSTAL DISPLACEMENT...";
        
        await new Promise(r => setTimeout(r, 50));

        const iter = parseInt(document.getElementById('iterations').value);
        const waterPct = parseInt(document.getElementById('water').value);
        const icePct = parseInt(document.getElementById('ice').value) / 100;
        const palette = Palettes[document.getElementById('palette').value];
        const proj = document.getElementById('projection').value;

        let map = new Float32Array(W * H).fill(0);
        
        // --- Core Algorithm: Great Circle Faulting ---
        for(let i=0; i<iter; i++) {
            let phi = Math.random() * Math.PI * 2;
            let theta = Math.random() * Math.PI;
            let nx = Math.cos(phi) * Math.sin(theta);
            let ny = Math.sin(phi) * Math.sin(theta);
            let nz = Math.cos(theta);

            for(let y=0; y<H; y++) {
                let lat = (Math.PI * y) / H - Math.PI/2;
                let cosLat = Math.cos(lat);
                let sinLat = Math.sin(lat);
                for(let x=0; x<W; x++) {
                    let lon = (Math.PI * 2 * x) / W - Math.PI;
                    let px = Math.cos(lon) * cosLat;
                    let py = Math.sin(lon) * cosLat;
                    let pz = sinLat;
                    map[y*W + x] += (px*nx + py*ny + pz*nz > 0) ? 1 : -1;
                }
            }
        }

        // Determine Sea Level
        let sorted = [...map].sort((a,b) => a-b);
        let seaLevel = sorted[Math.floor((waterPct/100) * (sorted.length-1))];
        let min = sorted[0], max = sorted[sorted.length-1];

        const img = ctx.createImageData(W, H);
        
        // --- Render Pass ---
        for(let y=0; y<H; y++) {
            // Latitude in degrees for ice calculation (-90 to 90)
            let latDeg = (y / H) * 180 - 90; 
            let absLat = Math.abs(latDeg); 
            
            // Ice logic: if absLat > (90 - ice_range), it's frozen
            let isIceZone = absLat > (90 - (icePct * 90));

            for(let x=0; x<W; x++) {
                let latRad = (y / H) * Math.PI - Math.PI/2;
                let lonRad = (x / W) * 2 * Math.PI - Math.PI;
                let tx = x, skip = false;

                // Handle Projections
                if(proj === 'mollweide') {
                    tx = W/2 + (W/2) * (lonRad/Math.PI) * Math.cos(latRad);
                    if(Math.abs(x - W/2) > (W/2) * Math.cos(latRad)) skip = true;
                } else if(proj === 'sinusoidal') {
                    tx = W/2 + (x - W/2) * Math.cos(latRad);
                    if(Math.abs(x - W/2) > (W/2) * Math.cos(latRad)) skip = true;
                }

                if(skip) continue;

                let h = map[y*W + x];
                let outIdx = (y*W + Math.floor(tx)) * 4;
                let color = [0,0,0];

                if (isIceZone) {
                    // Polar Ice Color
                    color = palette.ice;
                } else if(h <= seaLevel) {
                    // Water
                    let d = (h - min) / (seaLevel - min);
                    color = palette.sea.map(c => c * (0.4 + d*0.6));
                } else {
                    // Land/Mountains
                    let d = (h - seaLevel) / (max - seaLevel);
                    if (d > 0.8) { // High altitude snow
                         color = palette.ice.map((c, i) => c * 0.9);
                    } else {
                         color = palette.land.map((c, i) => c + (palette.mt[i] - c) * d);
                    }
                }

                img.data[outIdx] = color[0];
                img.data[outIdx+1] = color[1];
                img.data[outIdx+2] = color[2];
                img.data[outIdx+3] = 255;
            }
        }
        ctx.clearRect(0,0,W,H);
        ctx.putImageData(img, 0, 0);
        status.innerText = "RENDER_COMPLETE // ICE_CAPS_STABILIZED";
    }

    // Run on initial load
    generate();
</script>
</body>
</html>
