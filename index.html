<!DOCTYPE html>
<html>
<head>
    <title>Fractal World Generator</title>
    <style>
        /* Restoring your original styling */
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        canvas { border: 2px solid #555; background: #000; margin-top: 20px; }
        .controls { margin: 20px; padding: 10px; background: #333; display: inline-block; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>World Generator Settings</h2>
        <label>Roughness: <input type="number" id="roughness" value="0.7" step="0.1"></label>
        <button onclick="generateWorld()">Generate Map</button>
    </div>

    <br>
    <canvas id="canvas"></canvas>

    <script src="src/fractalworldengine.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const size = 513; // Must be 2^n + 1
        canvas.width = canvas.height = size;

        function generateWorld() {
            const roughness = parseFloat(document.getElementById('roughness').value);
            
            // 1. Initialize the Engine
            const engine = new FractalWorldEngine(size, roughness, 128);
            
            // 2. Run the calculation
            const mapData = engine.computeFractal();
            
            // 3. Render the results (visual logic stays in index/main)
            drawMap(mapData);
        }

        function drawMap(data) {
            const imgData = ctx.createImageData(size, size);
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    let val = data[x][y];
                    let i = (x + y * size) * 4;
                    // Basic biome coloring logic
                    imgData.data[i] = val < 128 ? 0 : val;       // R
                    imgData.data[i+1] = val > 128 ? val : 100;   // G
                    imgData.data[i+2] = val < 100 ? 200 : 50;    // B
                    imgData.data[i+3] = 255;                     // A
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // Initial run
        generateWorld();
    </script>
</body>
</html>
